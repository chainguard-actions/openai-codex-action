name: Test custom codex-home directory
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTOR: test-user
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up fake npm to stub codex package installs
        run: |
          mkdir -p /tmp/fake-bin

          # Write stub codex binary
          printf '#!/bin/sh\necho "codex stub 0.0.0-test"\n' > /tmp/fake-bin/codex-stub
          chmod +x /tmp/fake-bin/codex-stub

          # Write stub codex-responses-api-proxy binary
          printf '#!/bin/sh\necho "codex-responses-api-proxy stub 0.0.0-test"\n' > /tmp/fake-bin/proxy-stub
          chmod +x /tmp/fake-bin/proxy-stub

          # Write fake npm using printf to avoid heredoc YAML issues
          printf '%s\n' '#!/bin/sh' \
            '# Intercept global installs of @openai/codex packages' \
            'for arg in "$@"; do' \
            '  case "$arg" in' \
            '    *@openai/codex*)' \
            '      cp /tmp/fake-bin/codex-stub /usr/local/bin/codex' \
            '      cp /tmp/fake-bin/proxy-stub /usr/local/bin/codex-responses-api-proxy' \
            '      echo "Fake npm: stubbed install for: $arg"' \
            '      exit 0' \
            '      ;;' \
            '  esac' \
            'done' \
            'exec /usr/bin/npm "$@"' \
            > /tmp/fake-bin/npm
          chmod +x /tmp/fake-bin/npm

          echo "/tmp/fake-bin" >> "$GITHUB_PATH"

      - name: Run action with custom codex-home and no prompt
        id: action
        uses: .
        with:
          allow-users: "*"
          safety-strategy: unsafe
          codex-home: /tmp/my-codex-home
          codex-version: "latest"

      - name: Assert final-message is empty (no prompt given)
        env:
          ACTUAL: ${{ steps.action.outputs['final-message'] }}
        run: |
          echo "actual: '$ACTUAL'"
          if [ -n "$ACTUAL" ]; then
            echo "FAIL: expected empty final-message but got: $ACTUAL"
            exit 1
          fi
          echo "PASS: final-message is empty as expected"

      - name: Assert codex CLI is installed
        run: |
          if ! command -v codex >/dev/null 2>&1; then
            echo "FAIL: codex CLI not found on PATH"
            exit 1
          fi
          echo "PASS: codex CLI is installed"

      - name: Assert action completed successfully with custom codex-home
        run: |
          echo "PASS: action completed successfully with custom codex-home=/tmp/my-codex-home"
