name: Test allow-users input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
      GITHUB_ACTOR: test-user
      GITHUB_REPOSITORY: openai/codex-action
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          # allow-users '*' allows any user to run the action
          allow-users: "*"
          safety-strategy: "unsafe"

      - name: Assert action completed with allow-users wildcard
        run: |
          echo "Action completed successfully with allow-users='*'."
          echo "PASS"
