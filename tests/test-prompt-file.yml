name: Test prompt-file input (no API key)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
      GITHUB_ACTOR: test-user
      GITHUB_REPOSITORY: openai/codex-action
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create prompt file
        run: |
          echo "Print hello world" > /tmp/test-prompt.txt

      - id: action
        uses: .
        continue-on-error: true
        with:
          # prompt-file is set but no openai-api-key.
          # The action will pass the write-access check (allow-users='*'),
          # install Node/npm packages, resolve codex-home, then fail at
          # "Read server info" because no proxy was started.
          # This verifies the action correctly processes the prompt-file input
          # and reaches the server-info step before failing.
          prompt-file: "/tmp/test-prompt.txt"
          safety-strategy: "unsafe"
          allow-users: "*"

      - name: Assert action failed at expected step
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail (no proxy running for prompt-file without API key)"
            exit 1
          fi
          echo "PASS: action failed as expected when prompt-file is set without an API key"
